name: agencia_app
description: "App de marca blanca: catálogo de inmuebles de una inmobiliaria."
publish_to: 'none'

# La versión se puede sobreescribir al compilar cada app con
# --build-name y --build-number.
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.15.0
  intl: ^0.20.2
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  share_plus: ^12.0.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Genera el ícono de la app a partir del logo de cada inmobiliaria
  # (lo usa crear_app.ps1 cuando se pasa -Logo).
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
